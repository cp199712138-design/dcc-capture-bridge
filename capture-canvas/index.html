<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DCC Capture Canvas</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090a0d;
      --rail: #050608;
      --panel: #11141a;
      --panel-2: #181c24;
      --panel-3: #242936;
      --line: rgba(255, 255, 255, 0.1);
      --line-strong: rgba(255, 255, 255, 0.18);
      --text: #f7f8fb;
      --muted: #9aa3b1;
      --soft: #d9dee8;
      --canvas: #e8e9e5;
      --canvas-2: #dfe3e1;
      --blue: #68a5ff;
      --mint: #63e6b4;
      --red: #ff6575;
      --yellow: #f3d35a;
      --cyan: #29f2ff;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: var(--bg);
    }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, textarea:focus-visible, input:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .46;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      background:
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.03) 1px, transparent 1px),
        var(--bg);
      background-size: 34px 34px;
    }

    .rail {
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 14px;
      padding: 14px;
      background: rgba(5, 6, 8, .96);
      border-right: 1px solid var(--line);
    }
    .brand {
      display: grid;
      gap: 4px;
      padding: 10px 2px 8px;
    }
    .brand strong { font-size: 16px; letter-spacing: 0; }
    .brand span { color: var(--muted); font-size: 12px; line-height: 1.45; }

    .section {
      display: grid;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .section-title {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .tool-list { display: grid; gap: 8px; }
    .tool-row {
      min-height: 44px;
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--soft);
      background: rgba(255,255,255,.035);
      text-align: left;
    }
    .tool-row .icon {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--soft);
      background: rgba(255,255,255,.06);
      font-weight: 800;
      font-size: 12px;
    }
    .tool-row span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .tool-row.active {
      color: #061018;
      background: var(--mint);
      border-color: var(--mint);
      font-weight: 800;
    }
    .tool-row.active .icon {
      color: #061018;
      background: rgba(6,16,24,.1);
    }
    .tool-row.danger.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .mini-field {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }
    .mini-field input {
      width: 100%;
      accent-color: var(--mint);
    }

    .session-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.035);
    }
    .session-card strong { font-size: 13px; }
    .session-card span { color: var(--muted); font-size: 12px; line-height: 1.45; overflow-wrap: anywhere; }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: 54px minmax(0, 1fr) 128px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      background: rgba(9,10,13,.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }
    .title {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .status-pill.api {
      border-color: rgba(41,242,255,.26);
      color: #d8fcff;
      background: rgba(41,242,255,.08);
    }
    .status-pill.api.busy {
      color: #061018;
      background: var(--cyan);
      border-color: var(--cyan);
      font-weight: 900;
    }
    .status-pill.api.error {
      color: #fff3f4;
      background: rgba(255,101,117,.14);
      border-color: rgba(255,101,117,.42);
    }
    .title strong { font-size: 15px; white-space: nowrap; }
    .title span {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .pill {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--soft);
      background: rgba(255,255,255,.04);
      font-size: 12px;
      white-space: nowrap;
    }
    .lang {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
    }
    .lang button {
      min-height: 30px;
      padding: 0 10px;
      border: 0;
      color: var(--muted);
      background: transparent;
      font-size: 12px;
    }
    .lang button.active {
      color: #061018;
      background: var(--mint);
      font-weight: 800;
    }

    .board {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 2px;
      padding: 0;
      background: #06070a;
    }
    .pane {
      position: relative;
      overflow: hidden;
      background: var(--canvas);
    }
    .pane.output { background: var(--canvas-2); }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    #sourceCanvas { cursor: none; }
    .pane-label {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 4;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-radius: 999px;
      color: var(--text);
      background: rgba(7, 8, 11, .76);
      backdrop-filter: blur(14px);
      font-size: 12px;
      font-weight: 700;
    }
    .live-badge {
      top: auto;
      bottom: 14px;
      left: 14px;
      color: #061018;
      background: rgba(99,230,180,.86);
    }
    .output-badge {
      background: rgba(41,242,255,.82);
    }
    .asset-card {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 4;
      width: min(260px, calc(100% - 28px));
      padding: 12px;
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px;
      color: #17202c;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(16px);
      box-shadow: 0 12px 28px rgba(0,0,0,.08);
    }
    .asset-card strong { display: block; font-size: 13px; }
    .asset-card span {
      display: block;
      margin-top: 5px;
      color: #5a6573;
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      text-align: center;
      color: #626d7b;
    }
    .empty strong {
      display: block;
      color: #1d2632;
      font-size: 18px;
      margin-bottom: 8px;
    }
    .empty span {
      display: block;
      max-width: 430px;
      padding: 0 28px;
      line-height: 1.55;
    }

    .canvas-toolbar {
      position: absolute;
      left: 50%;
      bottom: 24px;
      z-index: 8;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: calc(100% - 32px);
      padding: 8px;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: rgba(22, 23, 27, .88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .icon-btn {
      min-width: 42px;
      min-height: 42px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 13px;
      color: var(--text);
      background: rgba(255,255,255,.06);
      font-weight: 800;
      font-size: 12px;
    }
    .icon-btn.active {
      color: #061018;
      background: var(--mint);
      border-color: var(--mint);
    }
    .icon-btn.danger {
      color: #ffeef1;
      background: rgba(255,101,117,.16);
      border-color: rgba(255,101,117,.32);
    }
    .divider {
      width: 1px;
      height: 30px;
      background: rgba(255,255,255,.12);
    }
    .slider-pack {
      min-width: 132px;
      display: grid;
      gap: 3px;
      padding: 0 4px;
      color: var(--muted);
      font-size: 11px;
    }
    .slider-pack input { width: 100%; accent-color: var(--mint); }
    .readout {
      min-width: 130px;
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: 11px;
    }
    .readout strong { color: var(--text); font-size: 12px; }

    .brush-cursor {
      position: absolute;
      z-index: 7;
      width: var(--brush, 42px);
      height: var(--brush, 42px);
      border: 2px solid rgba(99,230,180,.98);
      border-radius: 999px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      box-shadow: 0 0 0 1px rgba(0,0,0,.72), 0 0 22px rgba(99,230,180,.28);
      transition: width .08s ease, height .08s ease, opacity .12s ease, border-color .12s ease;
    }
    .brush-cursor.erase {
      border-color: rgba(255,101,117,.98);
      box-shadow: 0 0 0 1px rgba(0,0,0,.72), 0 0 22px rgba(255,101,117,.26);
    }
    .brush-cursor.shape { border-style: dashed; }

    .footer {
      display: grid;
      place-items: start center;
      padding: 10px 18px 18px;
      border-top: 1px solid var(--line);
      background: rgba(9,10,13,.92);
    }
    .prompt-shell {
      width: min(640px, calc(100vw - 36px));
      display: grid;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid var(--line-strong);
      border-radius: 22px;
      background: rgba(39, 40, 45, .94);
      box-shadow: var(--shadow);
    }
    .prompt-shell textarea {
      width: 100%;
      min-height: 46px;
      max-height: 76px;
      resize: none;
      border: 0;
      outline: none;
      color: var(--text);
      background: transparent;
      line-height: 1.45;
    }
    .prompt-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .prompt-tags {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      min-height: 30px;
      padding: 0 11px;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 999px;
      color: var(--soft);
      background: rgba(255,255,255,.055);
      font-size: 12px;
      white-space: nowrap;
    }
    .chip.active {
      color: #061018;
      background: var(--mint);
      border-color: var(--mint);
      font-weight: 800;
    }
    .primary {
      min-height: 42px;
      padding: 0 18px;
      border: 0;
      border-radius: 12px;
      color: #071018;
      background: var(--blue);
      font-weight: 900;
      white-space: nowrap;
    }
    .status-line {
      width: min(640px, calc(100vw - 36px));
      margin-top: 7px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .status-line strong { color: var(--text); font-size: 12px; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--mint);
      box-shadow: 0 0 16px rgba(99,230,180,.56);
      flex: 0 0 auto;
    }

    input[type="file"] { display: none; }

    @media (max-width: 1100px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; }
      .rail {
        grid-template-rows: auto auto;
        grid-template-columns: minmax(180px, 1fr) repeat(2, minmax(220px, 1fr));
        align-items: start;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .rail .section:nth-of-type(3),
      .rail .session-card { display: none; }
      .main { min-height: 820px; }
    }

    @media (max-width: 760px) {
      .rail { grid-template-columns: 1fr; }
      .main { grid-template-rows: auto minmax(640px, 1fr) auto; }
      .topbar { align-items: flex-start; flex-direction: column; padding: 12px 14px; }
      .top-actions { flex-wrap: wrap; }
      .board { grid-template-columns: 1fr; }
      .canvas-toolbar { flex-wrap: wrap; justify-content: center; bottom: 14px; }
      .slider-pack { min-width: 112px; }
      .prompt-actions { align-items: stretch; flex-direction: column; }
      .primary { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="brand">
        <strong>DCC Capture Canvas</strong>
        <span data-cn="把 3ds Max / Blender 证据变成可控的实时 AI 编辑输入。" data-en="Turn 3ds Max / Blender evidence into controllable realtime AI edit input.">把 3ds Max / Blender 证据变成可控的实时 AI 编辑输入。</span>
      </div>

      <section class="section">
        <div class="section-title" data-cn="画布工具" data-en="Canvas Tools">画布工具</div>
        <div class="tool-list">
          <button class="tool-row" id="selectTool" data-tool="select" data-cn-title="选择" data-en-title="Select">
            <span class="icon">↖</span><span data-cn="选择" data-en="Select">选择</span>
          </button>
          <button class="tool-row active" id="brushChip" data-tool="brush" data-cn-title="画笔" data-en-title="Brush">
            <span class="icon">B</span><span data-cn="画笔" data-en="Brush">画笔</span>
          </button>
          <button class="tool-row" id="eraserChip" data-tool="erase" data-cn-title="橡皮擦" data-en-title="Eraser">
            <span class="icon">E</span><span data-cn="橡皮擦" data-en="Eraser">橡皮擦</span>
          </button>
          <button class="tool-row" id="rectTool" data-tool="rect" data-cn-title="矩形选区" data-en-title="Rectangle Region">
            <span class="icon">□</span><span data-cn="矩形选区" data-en="Rectangle Region">矩形选区</span>
          </button>
          <button class="tool-row" id="circleTool" data-tool="circle" data-cn-title="圆形选区" data-en-title="Circle Region">
            <span class="icon">○</span><span data-cn="圆形选区" data-en="Circle Region">圆形选区</span>
          </button>
        </div>
      </section>

      <section class="section">
        <div class="section-title" data-cn="输入" data-en="Input">输入</div>
        <div class="tool-list">
          <button class="tool-row" id="importImageNav">
            <span class="icon">IMG</span><span data-cn="导入图片" data-en="Import Image">导入图片</span>
          </button>
          <button class="tool-row" id="importModelNav">
            <span class="icon">3D</span><span data-cn="导入模型" data-en="Import Model">导入模型</span>
          </button>
        </div>
      </section>

      <section class="section">
        <div class="section-title" data-cn="控制" data-en="Controls">控制</div>
        <label class="mini-field">
          <span data-cn="画笔大小" data-en="Brush Size">画笔大小</span>
          <input id="brushSize" type="range" min="10" max="96" value="42">
        </label>
        <label class="mini-field">
          <span data-cn="生成强度" data-en="Generation Strength">生成强度</span>
          <input id="strength" type="range" min="0" max="100" value="62">
        </label>
      </section>

      <div class="session-card">
        <strong data-cn="本地原型" data-en="Local Prototype">本地原型</strong>
        <span data-cn="当前先做实时编辑体验：导入、涂抹、擦除、矩形、圆形、示例、种子和预览都要能工作。" data-en="This version focuses on realtime edit UX: import, paint, erase, rectangle, circle, examples, seed, and preview all work.">当前先做实时编辑体验：导入、涂抹、擦除、矩形、圆形、示例、种子和预览都要能工作。</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title">
          <strong>DCC Capture Canvas</strong>
          <span data-cn="实时编辑画布，不再是单一截图按钮" data-en="Realtime edit canvas, not a single screenshot button">实时编辑画布，不再是单一截图按钮</span>
        </div>
        <div class="top-actions">
          <span class="pill">v0.6</span>
          <span class="pill status-pill api" id="apiState" data-cn="API 未检测" data-en="API not checked">API 未检测</span>
          <div class="lang" aria-label="Language">
            <button class="active" data-lang="cn">中文</button>
            <button data-lang="en">EN</button>
          </div>
        </div>
      </header>

      <section class="board" id="board">
        <div class="pane input">
          <div class="pane-label" data-cn="输入画布" data-en="Input Canvas">输入画布</div>
          <canvas id="sourceCanvas"></canvas>
          <div class="pane-label live-badge" id="inputBadge" data-cn="输入" data-en="Input">输入</div>
          <div class="empty" id="sourceEmpty">
            <div>
              <strong data-cn="导入图片或模型开始" data-en="Import an image or model">导入图片或模型开始</strong>
              <span data-cn="左侧是证据输入和遮罩编辑。画笔添加区域，橡皮擦移除区域，矩形和圆形用于快速圈选。" data-en="The left side is for evidence input and mask editing. Brush adds regions, eraser removes regions, and shapes select areas quickly.">左侧是证据输入和遮罩编辑。画笔添加区域，橡皮擦移除区域，矩形和圆形用于快速圈选。</span>
            </div>
          </div>
        </div>

        <div class="pane output">
          <div class="pane-label" data-cn="实时预览" data-en="Live Preview">实时预览</div>
          <canvas id="resultCanvas"></canvas>
          <div class="pane-label live-badge output-badge" id="outputBadge" data-cn="本地预览" data-en="Local Preview">本地预览</div>
          <div class="asset-card">
            <strong data-cn="当前证据" data-en="Current Evidence">当前证据</strong>
            <span id="assetInfo" data-cn="等待输入。" data-en="Waiting for input.">等待输入。</span>
          </div>
        </div>

        <div class="canvas-toolbar">
          <button class="icon-btn tool-button" id="brushBtn" data-tool="brush" title="Brush">B</button>
          <button class="icon-btn tool-button" id="eraseBtn" data-tool="erase" title="Eraser">E</button>
          <button class="icon-btn tool-button" id="rectBtn" data-tool="rect" title="Rectangle">□</button>
          <button class="icon-btn tool-button" id="circleBtn" data-tool="circle" title="Circle">○</button>
          <button class="icon-btn danger" id="clearBtn" title="Clear Mask">CLR</button>
          <span class="divider"></span>
          <button class="icon-btn" id="importImageBtn" title="Import Image">IMG</button>
          <button class="icon-btn" id="importModelBtn" title="Import Model">3D</button>
          <span class="divider"></span>
          <label class="slider-pack">
            <span data-cn="大小" data-en="Size">大小</span>
            <input id="brushSizeDock" type="range" min="10" max="96" value="42">
          </label>
          <label class="slider-pack">
            <span data-cn="强度" data-en="Strength">强度</span>
            <input id="strengthDock" type="range" min="0" max="100" value="62">
          </label>
          <div class="readout">
            <strong id="toolModeText">画笔</strong>
            <span id="brushSizeText">42 px</span>
          </div>
        </div>

        <div class="brush-cursor" id="brushCursor"></div>
      </section>

      <section class="footer">
        <div class="prompt-shell">
          <textarea id="prompt" data-cn-value="把遮罩区域生成更干净的产品场景，保留主体形状、材质边界和相机角度。" data-en-value="Generate a cleaner product scene inside the masked region while preserving shape, material boundaries, and camera angle.">把遮罩区域生成更干净的产品场景，保留主体形状、材质边界和相机角度。</textarea>
          <div class="prompt-actions">
            <div class="prompt-tags">
              <button class="chip active" id="imageChip" data-cn="图像" data-en="Image">图像</button>
              <button class="chip" id="drawModeChip" data-cn="绘制" data-en="Draw">绘制</button>
              <button class="chip" id="aspectRatioChip">1:1</button>
              <button class="chip" id="examplesChip" data-cn="示例" data-en="Examples">示例</button>
              <button class="chip" id="seedChip" data-cn="种子 1284" data-en="Seed 1284">种子 1284</button>
              <button class="chip active" id="liveChip" data-cn="实时" data-en="Live">实时</button>
            </div>
            <button class="primary" id="previewBtn" data-cn="更新预览" data-en="Update Preview">更新预览</button>
          </div>
        </div>
        <div class="status-line">
          <span class="dot"></span>
          <strong id="statusTitle" data-cn="准备就绪" data-en="Ready">准备就绪</strong>
          <span id="statusText" data-cn="导入图片或模型，然后用画笔/形状定义要编辑的区域。" data-en="Import an image or model, then use brush or shapes to define the edit region.">导入图片或模型，然后用画笔/形状定义要编辑的区域。</span>
        </div>
      </section>
    </main>
  </div>

  <input id="imageInput" type="file" accept="image/*">
  <input id="modelInput" type="file" accept=".glb,.gltf,.obj,.fbx,.stl,.usdz">

  <script type="module" src="./app.mjs"></script>
</body>
