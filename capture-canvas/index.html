<!doctype html>
<html lang='zh-CN'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>DCC Capture Canvas</title>
<style>
:root{color-scheme:dark;--bg:#070b12;--panel:#101722;--panel2:#151f2d;--ink:#f7f9fc;--muted:#97a8bc;--line:rgba(255,255,255,.12);--blue:#68a7ff;--cyan:#64e9ff;--mint:#65efbd;--pink:#ff78b4;font-family:Inter,'Segoe UI',Arial,'Microsoft YaHei',sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:radial-gradient(circle at 14% 12%,rgba(101,239,189,.14),transparent 28%),radial-gradient(circle at 78% 18%,rgba(104,167,255,.18),transparent 34%),radial-gradient(circle at 78% 86%,rgba(255,120,180,.1),transparent 34%),var(--bg);overflow:hidden}button,input,select,textarea{font:inherit}button{cursor:pointer}button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}.app{height:100vh;min-width:1180px;display:grid;grid-template-rows:62px minmax(0,1fr) 104px}header{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:0 18px;border-bottom:1px solid var(--line);background:rgba(7,11,18,.82);backdrop-filter:blur(18px)}.brand{display:flex;align-items:center;gap:12px}.mark{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,var(--mint),var(--blue) 58%,var(--pink));box-shadow:0 0 34px rgba(101,239,189,.22)}.brand strong{display:block;font-size:15px}.brand span{display:block;margin-top:2px;color:var(--muted);font-size:12px}.top{display:flex;align-items:center;gap:10px}.pill,.lang button,.tool,.chip{border:1px solid var(--line);border-radius:999px;color:var(--ink);background:rgba(255,255,255,.045)}.pill{min-height:30px;display:inline-flex;align-items:center;padding:0 12px;color:#c9d6e6;font-size:12px}.lang{display:flex;gap:4px;padding:4px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.04)}.lang button{min-height:28px;padding:0 11px;border:0;color:var(--muted);background:transparent;font-size:12px}.lang button.active{color:#061017;background:var(--mint);font-weight:800}.workspace{min-height:0;display:grid;grid-template-columns:280px minmax(0,1fr) 360px}.left,.right{min-height:0;overflow:auto;padding:18px 14px;background:rgba(13,19,28,.9);backdrop-filter:blur(18px)}.left{border-right:1px solid var(--line)}.right{border-left:1px solid var(--line)}section{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--line)}section:last-child{border-bottom:0}h2{margin:0 0 12px;color:#b8c8db;font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}label{display:block;margin:10px 0 6px;color:var(--muted);font-size:12px}select,input,textarea{width:100%;min-height:38px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;color:var(--ink);background:rgba(7,11,18,.86)}textarea{min-height:120px;resize:vertical;line-height:1.5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.chip{min-height:34px;color:#d8e3f1;font-size:12px;background:rgba(255,255,255,.035)}.chip.active{border-color:var(--mint);background:rgba(101,239,189,.13)}.full{width:100%;min-height:42px;border:1px solid var(--line);border-radius:11px;color:var(--ink);background:rgba(255,255,255,.05);font-weight:800}.full.primary{border:0;color:#061017;background:var(--blue)}.full.mint{border:0;color:#061017;background:var(--mint)}main{min-width:0;padding:20px;overflow:hidden}.stage{position:relative;height:100%;min-height:530px;overflow:hidden;border:1px solid var(--line);border-radius:18px;background:linear-gradient(rgba(255,255,255,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.055) 1px,transparent 1px),rgba(10,15,23,.82);background-size:32px 32px;box-shadow:0 26px 80px rgba(0,0,0,.42)}.toolbar{position:absolute;top:18px;left:18px;right:18px;z-index:3;display:flex;justify-content:space-between;align-items:center;gap:12px}.tabs,.actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.tool{min-height:36px;padding:0 13px;color:#cdd7e6;background:rgba(11,16,24,.76)}.tool.active{border-color:var(--cyan);color:var(--ink);background:rgba(100,233,255,.14)}.primary-pill{min-height:36px;border:0;border-radius:999px;padding:0 16px;color:#061017;background:var(--mint);font-weight:900}.canvas-shell{position:absolute;inset:82px 28px 30px;overflow:hidden;border:1px solid rgba(255,255,255,.11);border-radius:16px;background:radial-gradient(circle at 52% 42%,rgba(104,167,255,.2),transparent 34%),rgba(7,11,18,.6)}canvas{display:block;width:100%;height:100%}.drop{position:absolute;left:22px;bottom:18px;max-width:560px;color:var(--muted);font-size:13px;line-height:1.55;pointer-events:none}.asset{position:absolute;top:26px;right:26px;width:230px;padding:13px;border:1px solid var(--line);border-radius:14px;background:rgba(15,21,31,.82)}.asset strong{display:block;margin-bottom:6px;font-size:13px}.asset span{display:block;color:var(--muted);font-size:12px;line-height:1.45;overflow-wrap:anywhere}.task{margin-bottom:9px;padding:12px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.04);cursor:pointer}.task.active{border-color:var(--blue);background:rgba(104,167,255,.14)}.task strong{display:block;margin-bottom:5px;font-size:13px}.task span{color:var(--muted);font-size:12px;line-height:1.45}footer{display:grid;grid-template-columns:280px minmax(0,1fr) 360px;border-top:1px solid var(--line);background:rgba(7,11,18,.82)}.timeline-title{display:flex;align-items:center;padding:0 18px;border-right:1px solid var(--line);color:#b8c8db;font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}.frames{display:flex;align-items:center;gap:10px;overflow-x:auto;padding:12px 16px}.frame{flex:0 0 132px;height:76px;display:flex;align-items:end;padding:9px;border:1px solid var(--line);border-radius:11px;color:#d9e5f4;background:linear-gradient(135deg,rgba(104,167,255,.17),rgba(255,255,255,.04));font-size:11px}.status{display:flex;flex-direction:column;justify-content:center;gap:6px;padding:0 18px;border-left:1px solid var(--line);color:var(--muted);font-size:12px}.status strong{color:var(--ink);font-size:13px}@media(max-width:1180px){body{overflow:auto}.app{min-width:0;height:auto;min-height:100vh;grid-template-rows:auto}header,.toolbar{align-items:flex-start;flex-direction:column}.workspace,footer{grid-template-columns:1fr}main{min-height:760px}.left,.right{border:0;border-top:1px solid var(--line)}.canvas-shell{inset:134px 22px 28px}}
</style>
</head>
<body>
<div class='app'>
<header><div class='brand'><span class='mark'></span><div><strong>DCC Capture Canvas</strong><span data-cn='产品证据画布 / 给 AI 的 3D 输入工作台' data-en='Product evidence canvas for AI-ready 3D input'>产品证据画布 / 给 AI 的 3D 输入工作台</span></div></div><div class='top'><span class='pill'>v0.2 UI Foundation</span><span class='pill' data-cn='本地模式' data-en='Local Mode'>本地模式</span><div class='lang'><button class='active' data-lang='cn'>中文</button><button data-lang='en'>English</button></div></div></header>
<div class='workspace'>
<aside class='left'><section><h2 data-cn='捕捉源' data-en='Capture Source'>捕捉源</h2><label data-cn='DCC 软件' data-en='DCC'>DCC 软件</label><select><option>3ds Max</option><option>Blender</option><option>Manual Import</option></select><label data-cn='输入类型' data-en='Input Type'>输入类型</label><div class='grid'><button class='chip active' data-cn='视口' data-en='Viewport'>视口</button><button class='chip' data-cn='相机' data-en='Camera'>相机</button><button class='chip' data-cn='主体' data-en='Subject'>主体</button><button class='chip' data-cn='动画帧' data-en='Frame'>动画帧</button></div></section><section><h2 data-cn='证据类型' data-en='Evidence Types'>证据类型</h2><div class='grid'><button class='chip active'>Beauty</button><button class='chip'>Depth</button><button class='chip'>Normal</button><button class='chip'>Mask</button><button class='chip'>Material</button><button class='chip'>Wireframe</button></div></section><section><h2 data-cn='资产导入' data-en='Asset Import'>资产导入</h2><button class='full mint' id='importBtn' data-cn='导入截图 / 参考图' data-en='Import Image / Reference'>导入截图 / 参考图</button><button class='full' id='importModelBtn' style='margin-top:8px' data-cn='导入模型文件' data-en='Import Model File'>导入模型文件</button><input id='fileInput' type='file' accept='image/*' hidden><input id='modelInput' type='file' accept='.glb,.gltf,.obj,.fbx,.stl,.usdz' hidden><label data-cn='会话名称' data-en='Session Name'>会话名称</label><input value='DCC_session_local'></section></aside>
<main><div class='stage'><div class='toolbar'><div class='tabs'><button class='tool active' data-cn='证据画布' data-en='Evidence Board'>证据画布</button><button class='tool' data-cn='多角度' data-en='Multi-angle'>多角度</button><button class='tool' data-cn='材质研究' data-en='Material Study'>材质研究</button><button class='tool' data-cn='场景草图' data-en='Scene Draft'>场景草图</button></div><div class='actions'><button class='tool' id='clearBtn' data-cn='清空画布' data-en='Clear Board'>清空画布</button><button class='primary-pill' id='captureBtn' data-cn='准备证据包' data-en='Prepare Evidence Pack'>准备证据包</button></div></div><div class='canvas-shell' id='dropZone'><canvas id='board'></canvas><div class='asset'><strong data-cn='当前资产' data-en='Current Asset'>当前资产</strong><span id='assetInfo' data-cn='等待导入图片或模型。' data-en='Waiting for an image or model.'>等待导入图片或模型。</span></div><div class='drop' data-cn='拖入图片或模型文件。图片会直接显示；模型先作为证据资产登记，后续再接 GLB/OBJ 预览和 DCC 自动转换。' data-en='Drop an image or model file. Images preview immediately; models are registered as evidence assets first.'>拖入图片或模型文件。图片会直接显示；模型先作为证据资产登记，后续再接 GLB/OBJ 预览和 DCC 自动转换。</div></div></div></main>
<aside class='right'><section><h2 data-cn='AI 任务' data-en='AI Task'>AI 任务</h2><div class='task active'><strong data-cn='场景生成' data-en='Scene generation'>场景生成</strong><span data-cn='锁定产品结构、比例和相机角度。' data-en='Lock product structure, proportions, and camera angle.'>锁定产品结构、比例和相机角度。</span></div><div class='task'><strong data-cn='渲染细化' data-en='Render refinement'>渲染细化</strong><span data-cn='提升光影、细节和展示质感。' data-en='Improve lighting, detail, and presentation quality.'>提升光影、细节和展示质感。</span></div><div class='task'><strong data-cn='材质 / 纹理' data-en='Material / texture'>材质 / 纹理</strong><span data-cn='生成贴图、材质变体和表面参考。' data-en='Generate texture maps, material variants, and surface references.'>生成贴图、材质变体和表面参考。</span></div><div class='task'><strong data-cn='主体识别' data-en='Subject isolation'>主体识别</strong><span data-cn='提取主体、遮罩和产品身份。' data-en='Extract subject, masks, and product identity.'>提取主体、遮罩和产品身份。</span></div></section><section><h2 data-cn='提示词' data-en='Prompt'>提示词</h2><textarea data-cn-value='生成干净的产品场景，保持产品形状、相机角度、比例、材质边界和真实结构。' data-en-value='Create a clean product scene. Preserve object shape, camera angle, proportions, material boundaries, and real structure.'>生成干净的产品场景，保持产品形状、相机角度、比例、材质边界和真实结构。</textarea></section><section><h2 data-cn='控制' data-en='Controls'>控制</h2><label data-cn='AI 强度' data-en='AI strength'>AI 强度</label><input type='range' min='0' max='100' value='45'><label data-cn='输出比例' data-en='Output ratio'>输出比例</label><select><option>16:9 landscape</option><option>1:1 square</option><option>4:5 portrait</option></select></section><button class='full primary' id='generateBtn' data-cn='生成占位任务' data-en='Prepare Generation Task'>生成占位任务</button></aside>
</div>
<footer><div class='timeline-title' data-cn='历史 / 多角度' data-en='History / Angles'>历史 / 多角度</div><div class='frames' id='frames'><div class='frame' data-cn='正面' data-en='Front'>正面</div><div class='frame' data-cn='侧面' data-en='Side'>侧面</div><div class='frame' data-cn='背面' data-en='Back'>背面</div><div class='frame' data-cn='细节' data-en='Detail'>细节</div><div class='frame' data-cn='模型' data-en='Model'>模型</div></div><div class='status'><strong id='statusTitle' data-cn='准备就绪' data-en='Ready'>准备就绪</strong><span id='statusText' data-cn='等待 DCC 捕捉或本地导入。' data-en='Waiting for DCC capture or local import.'>等待 DCC 捕捉或本地导入。</span></div></footer>
</div>
<script>
var canvas=document.getElementById('board'),ctx=canvas.getContext('2d'),dropZone=document.getElementById('dropZone'),statusTitle=document.getElementById('statusTitle'),statusText=document.getElementById('statusText'),assetInfo=document.getElementById('assetInfo'),fileInput=document.getElementById('fileInput'),modelInput=document.getElementById('modelInput'),frames=document.getElementById('frames'),currentLang='cn',currentImage=null,currentModel=null;function text(cn,en){return currentLang==='cn'?cn:en}function size(n){return n>1048576?(n/1048576).toFixed(1)+' MB':Math.max(1,Math.round((n||0)/1024))+' KB'}function status(a,b,c,d){statusTitle.textContent=text(a,b);statusText.textContent=text(c,d)}function addFrame(label){var f=document.createElement('div');f.className='frame';f.textContent=label;frames.appendChild(f)}function round(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath()}function fit(){var r=canvas.getBoundingClientRect(),d=window.devicePixelRatio||1;canvas.width=Math.max(1,Math.floor(r.width*d));canvas.height=Math.max(1,Math.floor(r.height*d));ctx.setTransform(d,0,0,d,0,0);draw()}function draw(){var w=canvas.clientWidth,h=canvas.clientHeight;ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(7,11,18,.25)';ctx.fillRect(0,0,w,h);if(currentImage){var s=Math.min(w*.72/currentImage.width,h*.74/currentImage.height),iw=currentImage.width*s,ih=currentImage.height*s;ctx.drawImage(currentImage,(w-iw)/2,(h-ih)/2,iw,ih);return}var cx=w/2,cy=h/2+16;ctx.save();ctx.translate(cx,cy);ctx.fillStyle='rgba(104,167,255,.18)';ctx.beginPath();ctx.ellipse(0,122,230,52,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=currentModel?'#2d3f58':'#28384f';ctx.strokeStyle=currentModel?'#65efbd':'#68a7ff';ctx.lineWidth=2;round(ctx,-100,-104,200,200,34);ctx.fill();ctx.stroke();ctx.fillStyle='#0a1018';round(ctx,-62,-52,124,96,16);ctx.fill();ctx.fillStyle='#65efbd';ctx.beginPath();ctx.arc(-40,-18,12,0,Math.PI*2);ctx.arc(40,-18,12,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ffe36a';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(-46,28);ctx.quadraticCurveTo(0,54,46,28);ctx.stroke();if(currentModel){ctx.strokeStyle='#64e9ff';ctx.lineWidth=1.6;ctx.strokeRect(-138,-142,276,276)}ctx.restore();ctx.fillStyle='#f7f9fc';ctx.font='700 19px Inter, Segoe UI, sans-serif';ctx.fillText(currentModel?text('模型证据已登记','Model Evidence Registered'):text('产品证据画布','Product Evidence Canvas'),26,36);ctx.fillStyle='#98a7ba';ctx.font='13px Inter, Segoe UI, sans-serif';ctx.fillText(currentModel?currentModel.name:text('导入截图、参考图或模型文件，建立 AI 输入证据。','Import images, references, or model files to build AI evidence.'),26,58)}function loadImage(file){var url=URL.createObjectURL(file),img=new Image;img.onload=function(){currentImage=img;currentModel=null;draw();URL.revokeObjectURL(url);assetInfo.textContent=text('图片: ','Image: ')+file.name+' / '+size(file.size);status('参考图已载入','Reference loaded',file.name,file.name);addFrame(text('图片 ','Image ')+file.name)};img.src=url}function loadModel(file){currentImage=null;currentModel={name:file.name,size:file.size,ext:file.name.split('.').pop().toUpperCase()};draw();assetInfo.textContent=text('模型: ','Model: ')+currentModel.name+' / '+currentModel.ext+' / '+size(file.size);status('模型已登记','Model registered','已加入证据画布，下一步可接 GLB/OBJ 预览或 DCC 转换。','Added to evidence board. GLB/OBJ preview or DCC conversion can be added next.');addFrame(text('模型 ','Model ')+currentModel.name)}function handle(file){if(!file)return;if(file.type&&file.type.startsWith('image/')){loadImage(file);return}var e=file.name.split('.').pop().toLowerCase();if(['glb','gltf','obj','fbx','stl','usdz'].indexOf(e)>=0)loadModel(file)}document.querySelectorAll('.lang button').forEach(function(b){b.addEventListener('click',function(){currentLang=b.dataset.lang;document.documentElement.lang=currentLang==='cn'?'zh-CN':'en';document.querySelectorAll('[data-cn][data-en]').forEach(function(n){n.textContent=currentLang==='cn'?n.dataset.cn:n.dataset.en});document.querySelectorAll('[data-cn-value][data-en-value]').forEach(function(n){n.value=currentLang==='cn'?n.dataset.cnValue:n.dataset.enValue});document.querySelectorAll('.lang button').forEach(function(x){x.classList.toggle('active',x.dataset.lang===currentLang)});draw()})});document.querySelectorAll('.chip,.task,.tool').forEach(function(i){i.addEventListener('click',function(){if(i.classList.contains('task'))document.querySelectorAll('.task').forEach(function(t){t.classList.remove('active')});if(i.classList.contains('tool'))document.querySelectorAll('.tool').forEach(function(t){t.classList.remove('active')});i.classList.toggle('active');status('已切换','Changed',i.textContent,i.textContent)})});document.getElementById('importBtn').addEventListener('click',function(){fileInput.click()});document.getElementById('importModelBtn').addEventListener('click',function(){modelInput.click()});fileInput.addEventListener('change',function(){handle(fileInput.files&&fileInput.files[0])});modelInput.addEventListener('change',function(){handle(modelInput.files&&modelInput.files[0])});document.getElementById('clearBtn').addEventListener('click',function(){currentImage=null;currentModel=null;assetInfo.textContent=text('等待导入图片或模型。','Waiting for an image or model.');status('画布已清空','Board cleared','等待新的证据资产。','Waiting for new evidence assets.');draw()});document.getElementById('captureBtn').addEventListener('click',function(){status('证据包已准备','Evidence pack prepared','当前版本先整理 UI 和本地资产，AI 后端稍后接入。','This version organizes UI and local assets first. AI backend comes later.')});document.getElementById('generateBtn').addEventListener('click',function(){status('生成任务已准备','Generation task prepared','后续会把画布证据发送给 ComfyUI / OpenAI 等后端。','Later this will send canvas evidence to ComfyUI / OpenAI providers.')});dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.style.borderColor='#64e9ff'});dropZone.addEventListener('dragleave',function(){dropZone.style.borderColor='rgba(255,255,255,.11)'});dropZone.addEventListener('drop',function(e){e.preventDefault();dropZone.style.borderColor='rgba(255,255,255,.11)';handle(e.dataTransfer.files[0])});window.addEventListener('resize',fit);fit();
</script>
</body>
</html>
